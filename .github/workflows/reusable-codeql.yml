name: "Reusable — CodeQL"
# Called by each repo's security.yml for Python, JavaScript/TypeScript, and Go.
# Uploads findings as SARIF to GitHub Security tab (requires contents: read +
# actions: read + security-events: write in the calling workflow).
# All action steps are pinned to commit SHA for supply chain integrity.

on:
  workflow_call:
    inputs:
      language:
        description: "CodeQL language: python | javascript | go"
        type: string
        required: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL (${{ inputs.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e58424170fb0262c8d7ed60a2e84b9bffe205c67  # codeql-bundle-v2.26.1
        with:
          languages: ${{ inputs.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@e58424170fb0262c8d7ed60a2e84b9bffe205c67  # codeql-bundle-v2.26.1

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@e58424170fb0262c8d7ed60a2e84b9bffe205c67  # codeql-bundle-v2.26.1
        with:
          category: "/language:${{ inputs.language }}"
