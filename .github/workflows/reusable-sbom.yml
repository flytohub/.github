name: "Reusable — SBOM (CycloneDX) + Grype CVE scan"
# Called by each repo's security.yml.
# 1. Generates a CycloneDX-JSON SBOM with Syft (anchore/sbom-action).
# 2. Scans the SBOM with Grype and best-effort uploads findings as SARIF to GitHub Security tab.
# 3. Uploads SBOM as a workflow artifact (90-day retention).
# 4. Attaches SBOM to GitHub Releases automatically.
#
# SBOM artifacts are intentionally NOT linked from public release notes;
# they are available to qualified customers and security reviewers on request.
# See: https://github.com/flytohub/.github/blob/main/SECURITY.md

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Artifact name for the SBOM file"
        type: string
        default: "sbom"
      grype-fail-on:
        description: "Grype severity threshold to fail the build: negligible | low | medium | high | critical"
        type: string
        default: "high"

permissions:
  contents: read

jobs:
  sbom-and-scan:
    name: Generate SBOM + Grype CVE scan
    runs-on: ubuntu-latest
    permissions:
      contents: write         # attach to GitHub releases
      packages: read          # read registry package metadata
      security-events: write  # upload SARIF to GitHub Security tab
      actions: read           # allow upload-sarif to inspect this workflow run
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Generate SBOM (Syft / CycloneDX-JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: ${{ inputs.artifact-name }}
          upload-artifact: true
          upload-artifact-retention: 90
          upload-release-assets: true

      - name: Grype CVE scan (SARIF → Security tab)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype
        with:
          sbom: sbom.cdx.json
          fail-build: true
          severity-cutoff: ${{ inputs.grype-fail-on }}
          output-format: sarif
          output-file: grype-results.sarif

      - name: Upload Grype SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e58424170fb0262c8d7ed60a2e84b9bffe205c67  # codeql-bundle-v2.26.1
        with:
          sarif_file: grype-results.sarif
          category: grype
          wait-for-processing: false
