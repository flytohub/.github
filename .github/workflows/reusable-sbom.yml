name: "Reusable — SBOM (CycloneDX)"
# Called by each repo's security.yml.
# Generates a CycloneDX-JSON SBOM with Syft (anchore/sbom-action), uploads it
# as a workflow artifact and attaches it to GitHub Releases automatically.

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Artifact name for the SBOM file"
        type: string
        default: "sbom"

permissions:
  contents: read

jobs:
  generate:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach to GitHub releases
      packages: read    # read registry package metadata
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Generate SBOM (Syft / CycloneDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: ${{ inputs.artifact-name }}
          upload-artifact: true
          upload-artifact-retention: 90
          upload-release-assets: true
