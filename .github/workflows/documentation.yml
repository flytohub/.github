name: Documentation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  contract:
    uses: ./.github/workflows/reusable-documentation.yml

  verify:
    name: Lint, test, build, and verify organization docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Lint Markdown and documentation contract
        run: |
          git diff --check
          python3 scripts/audit-documentation.py . --strict --json
          python3 scripts/audit-repository-seo.py --json
      - name: Test Markdown links and public routes
        run: |
          python3 -m unittest discover -s scripts -p 'test_*.py'
          python3 scripts/audit-documentation.py . --strict --json
          grep -Fq "https://github.com/flytohub/flyto-core" profile/README.md
          grep -Fq "security@flyto2.com" SECURITY.md
      - name: Build documentation bundle
        run: |
          mkdir -p out
          COPYFILE_DISABLE=1 tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf out/flyto2-org-docs.tar.gz *.md docs profile ISSUE_TEMPLATE DISCUSSION_TEMPLATE workflows handoffs
          tar -tzf out/flyto2-org-docs.tar.gz >/dev/null
      - name: Verify generated reference and repository contract
        run: |
          python -m pip install "flyto-indexer @ git+https://github.com/flytohub/flyto-indexer@7ad6917887ffde8e43a3cee029c849a1a0ba2909"
          flyto-index verify . --full-scan --strict --json
          python3 scripts/generate-source-reference.py --check
