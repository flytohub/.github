name: Reusable Documentation Contract

on:
  workflow_call:
    inputs:
      strict:
        description: Treat documentation warnings as failures
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  documentation:
    name: Documentation contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Check out Flyto2 documentation standard
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: flytohub/.github
          path: .flyto-doc-standard

      - name: Validate documentation contract
        shell: bash
        env:
          STRICT: ${{ inputs.strict }}
        run: |
          set -euo pipefail
          args=(--json)
          if [[ "${STRICT}" == "true" ]]; then
            args+=(--strict)
          fi
          python3 .flyto-doc-standard/scripts/audit-documentation.py . "${args[@]}"

      - name: Verify caller source and documentation graph
        if: inputs.strict
        shell: bash
        run: |
          python -m pip install "flyto-indexer @ git+https://github.com/flytohub/flyto-indexer@1b624987b15ef7cd2361370478d07ea36e5aa5ee"
          flyto-index verify . --full-scan --strict --json
